appId: com.nicolaslopezj.mail-samurai
productName: Mail Samurai
directories:
  buildResources: build
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintcache,eslint.config.mjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md,CLAUDE.md,AGENTS.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
  - '!agent/**'
  - '!.signing/**'
asarUnpack:
  - resources/**
mac:
  category: public.app-category.productivity
  entitlementsInherit: build/entitlements.mac.plist
  extendInfo:
    - NSDocumentsFolderUsageDescription: Mail Samurai stores local email metadata in your Documents folder.
  hardenedRuntime: true
  gatekeeperAssess: false
  notarize: true
  target:
    - target: dmg
      arch:
        - arm64
        - x64
    - target: zip
      arch:
        - arm64
        - x64
dmg:
  artifactName: ${name}-${version}-${arch}.${ext}
npmRebuild: true
publish:
  provider: github
  owner: nicolaslopezj
  repo: mail-samurai
  releaseType: release
