appId: com.nicolaslopezj.mail-samurai
productName: Mail Samurai
directories:
  buildResources: build
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintcache,eslint.config.mjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md,CLAUDE.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
asarUnpack:
  - resources/**
mac:
  category: public.app-category.productivity
  entitlementsInherit: build/entitlements.mac.plist
  extendInfo:
    - NSDocumentsFolderUsageDescription: Mail Samurai stores local email metadata in your Documents folder.
  notarize: false
dmg:
  artifactName: ${name}-${version}.${ext}
win:
  executableName: mail-samurai
nsis:
  artifactName: ${name}-${version}-setup.${ext}
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}
  createDesktopShortcut: always
linux:
  target:
    - AppImage
    - deb
  maintainer: nicolaslopezj
  category: Office
appImage:
  artifactName: ${name}-${version}.${ext}
npmRebuild: true
